<!-- app/templates/edit_domain.html -->
{% extends "base.html" %}
{% block content %}
<div class="admin-card" style="max-width:500px; margin:2rem auto;">
  <h3>Editar Dominio</h3>
  {% if dom %}
    <form method="POST" action="{{ url_for('admin_bp.edit_domain', dom_id=dom.id) }}">
      <!-- Campo oculto para CSRF (indispensable para evitar el 403) -->
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <label for="domain">Dominio:</label>
      <input
        type="text"
        name="domain"
        value="{{ dom.domain }}"
        required
        style="width:100%; margin-bottom:1rem;"
      >

      <button type="submit" class="btn-green">Guardar Cambios</button>
      <!-- Enlace corregido: apunta a 'filters_page' para volver a la lista de dominios/filtros -->
      <a
        href="{{ url_for('admin_bp.filters_page') }}"
        class="btn-red"
        style="text-decoration:none; margin-left:1rem; padding:6px 12px;"
      >
        Cancelar
      </a>
    </form>
  {% else %}
    <p>No se encontró el dominio a editar.</p>
  {% endif %}
</div>
{% endblock %}
