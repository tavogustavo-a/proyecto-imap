<!-- app/templates/reset_password.html -->
{% extends "base.html" %}

{% block content %}
<div style="max-width:400px; margin:2rem auto;">
  <div class="card">
    <h3>Establecer Nueva Contraseña</h3>

    <!-- Importante: agregamos method="POST" y el campo _csrf_token -->
    <form method="POST" action="{{ url_for('auth_bp.reset_password', token=token) }}">
      <!-- Campo oculto para el token CSRF (SeaSurf) -->
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <label>Nueva Contraseña:</label>
      <input
        type="password"
        name="new_password"
        required
        style="width:100%; margin-bottom:1rem;"
      >

      <label>Repite la Contraseña:</label>
      <input
        type="password"
        name="confirm_password"
        required
        style="width:100%; margin-bottom:1rem;"
      >

      <button type="submit" class="btn-green">Cambiar Contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
