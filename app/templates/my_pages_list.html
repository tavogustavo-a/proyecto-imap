<!-- app/templates/my_pages_list.html -->
{% extends "base.html" %}

{% block title %}Mis Páginas{% endblock %}

{% block content %}
<div class="form-container-medium">
  <div class="card">
    <div class="d-flex justify-content-between align-items-center mb-1">
      <h2 class="mb-0">Mis Páginas</h2>
      <a href="{{ url_for('main_bp.home') }}" class="btn btn-blue text-decoration-none">Volver</a>
    </div>
    
    {% if managed_pages %}
      <div class="d-flex flex-column gap-1">
        {% for page in managed_pages %}
          <div class="my-pages-item d-flex align-items-center justify-content-between">
            <div>
              <strong>{{ page.route_path }}</strong>
            </div>
            <a href="{{ url_for('user_auth_bp.manage_my_page', server_id=page.id) }}" class="btn-blue text-decoration-none">
              <i class="fas fa-cog"></i> Gestionar
            </a>
          </div>
        {% endfor %}
      </div>
    {% else %}
      <p class="text-center text-secondary">No tienes páginas asignadas para gestionar.</p>
    {% endif %}
  </div>
</div>
{% endblock %}
