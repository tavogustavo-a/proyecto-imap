<!-- app/templates/edit_filter.html -->
{% extends "base.html" %}
{% block content %}
<div class="admin-card" style="max-width:600px; margin:1rem auto;">
  <h2>Editar Filtro</h2>
  
  <form method="POST">
    <!-- Campo oculto para el CSRF Token (SeaSurf) -->
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <label>Remitente (Sender):</label>
    <input type="text" name="sender" value="{{ filter.sender }}" style="margin-bottom:1rem;">

    <label>Palabra clave (Keyword):</label>
    <input type="text" name="keyword" value="{{ filter.keyword }}" style="margin-bottom:1rem;">

    <label>¿Habilitado?</label>
    <input type="checkbox" name="enabled" {% if filter.enabled %}checked{% endif %}>
    <br><br>

    <!-- Campo para "cortar HTML desde" -->
    <label>Cortar HTML desde (opcional):</label>
    <input
      type="text"
      name="cut_after_html"
      value="{{ filter.cut_after_html if filter.cut_after_html else '' }}"
      style="margin-bottom:1rem;"
    >

    <button type="submit" class="btn-green">Guardar</button>
    <!-- Botón para volver a la lista de Filtros (filters_page) -->
    <button
      type="button"
      class="btn-blue"
      onclick="location.href='{{ url_for('admin_bp.filters_page') }}'"
    >
      Volver
    </button>
  </form>
</div>
{% endblock %}
