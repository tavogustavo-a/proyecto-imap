{% extends "base.html" %}

{% block title %}Licencias Archivadas - Admin{% endblock %}

{% block head %}
  {{ super() }}
  <meta name="licenses-archive-mode" content="1">
  <link rel="stylesheet" href="{{ url_for('store_bp.static', filename='css/store.css') }}?v=20260519-historial-sin-contorno">
  <link rel="stylesheet" href="{{ url_for('static', filename='fontawesome/css/all.css') }}">
{% endblock %}

{% block content %}
<div class="container-fluid mt-2 store-light worksheet-panel admin-licencias-page admin-licencias-shell" data-admin-warranty-incidents-url="{{ url_for('store_bp.api_admin_license_warranty_incidents') }}">
  <div class="d-flex align-items-center admin-licencias-toolbar">
    <div class="d-flex gap-05 admin-store-menus">
      <a href="{{ url_for('store_bp.admin_store') }}" class="btn-arrow-back btn-arrow-back--toolbar-compact" aria-label="Volver a licencias">
        <i class="fas fa-arrow-left"></i>
      </a>
      <button type="button" id="licensesCollapseBtn" class="btn-blue menu-btn-worksheet licenses-collapse-btn licenses-collapse-btn--toolbar" title="Contraer o expandir licencias" aria-label="Contraer o expandir licencias">
        <i class="fas fa-chevron-up" id="collapseIcon" aria-hidden="true"></i>
      </button>
      <button type="button" id="btnRestaurarDesdeArchivo" class="btn-blue menu-btn-worksheet licenses-restore-archived-btn licenses-restore-archived-btn--toolbar" title="Volver a poner servicios en Licencias" aria-label="Restaurar productos en la plantilla Licencias">
        <i class="fas fa-folder-open" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <div class="d-flex flex-column align-items-center justify-content-center mb-4 w-100">
    <div class="d-flex flex-wrap align-items-center productos-buscar-mostrar productos-buscar-mostrar-centered">
      <div class="search-container">
        <label for="adminStoreSearch" class="sr-only">Buscar en licencias</label>
        <input type="search" id="adminStoreSearch" class="form-control text-center" placeholder="Buscar..." autocomplete="off">
      </div>
    </div>
  </div>
  
  <!-- Interfaz de Licencias -->
  <div class="licencias-container" id="licenciasContainer">
    <div class="licencias-content">
      <!-- Grid de Licencias -->
      <div id="licensesGrid" class="licenses-grid">
        <!-- Las licencias se cargarán dinámicamente aquí -->
      </div>
    </div>
  </div>

  <section id="adminLicenciasReportesPanel" class="admin-licencias-reportes-panel d-none" role="region" aria-label="Cuentas con reporte por cuadrar" aria-hidden="true">
    <div class="admin-licencias-reportes-inner">
      <div class="admin-licencias-reportes-controls">
        <label for="adminReportesSearch" class="sr-only">Filtrar lista de reportes</label>
        <input type="search" id="adminReportesSearch" class="form-control admin-licencias-reportes-search" placeholder="Filtrar por cuenta, usuario, estado…" autocomplete="off">
      </div>
      <div class="admin-licencias-reportes-table-scroll">
        <table class="admin-licencias-reportes-table" role="grid" aria-label="Cuentas reportadas">
          <thead>
            <tr>
              <th scope="col">Cuenta</th>
              <th scope="col">Usuario</th>
              <th scope="col">Estado</th>
              <th scope="col">Mala / garantía</th>
            </tr>
          </thead>
          <tbody id="adminReportesTableBody"></tbody>
        </table>
      </div>
      <p class="admin-licencias-reportes-meta" id="adminReportesMeta" aria-live="polite"></p>
    </div>
  </section>

  <div id="adminLicenciasBulkModal" class="admin-lic-bulk-modal" hidden aria-hidden="true">
    <div class="admin-lic-bulk-modal__backdrop" data-admin-lic-bulk-dismiss="1"></div>
    <div class="admin-lic-bulk-modal__panel" role="dialog" aria-modal="true" aria-labelledby="adminLicenciasBulkModalTitle">
      <div class="admin-lic-bulk-modal__head">
        <h2 id="adminLicenciasBulkModalTitle" class="admin-lic-bulk-modal__title">Edición masiva</h2>
        <button type="button" class="admin-lic-bulk-modal__close" data-admin-lic-bulk-dismiss="1" title="Cerrar" aria-label="Cerrar"><i class="fas fa-times" aria-hidden="true"></i></button>
      </div>
      <div class="admin-lic-bulk-modal__rows" id="adminLicBulkModalFields">
        <div class="admin-lic-bulk-modal__field admin-lic-bulk-modal__field--inline admin-lic-bulk-modal__field--qty-day-row">
          <div class="admin-lic-bulk-modal__inline-pair" id="adminLicBulkDayField">
            <label for="adminLicBulkDay" class="admin-lic-bulk-modal__label-plain">Día</label>
            <input type="number" id="adminLicBulkDay" class="form-control admin-lic-bulk-modal__input admin-lic-bulk-modal__input--qty" min="1" max="31" aria-label="Día del mes (1–31)">
          </div>
          <div class="admin-lic-bulk-modal__inline-pair">
            <label for="adminLicBulkRowCount" class="admin-lic-bulk-modal__label-plain">Cantidad</label>
            <input type="number" id="adminLicBulkRowCount" class="form-control admin-lic-bulk-modal__input admin-lic-bulk-modal__input--qty" min="1" value="1" aria-label="Cuántas licencias con credencial editar, desde arriba">
          </div>
        </div>
        <div class="admin-lic-bulk-modal__field admin-lic-bulk-modal__field--user-status-line">
          <div class="admin-lic-bulk-modal__user-inline">
            <label for="adminLicBulkUser" class="admin-lic-bulk-modal__label-plain">Usuario/cliente</label>
            <input type="text" id="adminLicBulkUser" class="form-control admin-lic-bulk-modal__input admin-lic-bulk-modal__input--user-inline" value="anonimo" placeholder="anonimo" autocomplete="off" aria-label="Usuario o cliente">
          </div>
          <div class="admin-lic-bulk-modal__status-inline-group" aria-label="Estados">
            <div class="admin-lic-bulk-modal__status-inline-block">
              <select id="adminLicBulkSelGood" class="form-control admin-lic-bulk-modal__input" title="Estado verde (columna buena)" aria-label="Estado verde"></select>
            </div>
            <div class="admin-lic-bulk-modal__status-inline-block">
              <select id="adminLicBulkSelBad" class="form-control admin-lic-bulk-modal__input" title="Estado rojo (incidencia)" aria-label="Estado rojo"></select>
            </div>
          </div>
        </div>
        <div class="admin-lic-bulk-modal__field admin-lic-bulk-modal__field--otro-follow">
          <div id="adminLicBulkOtroWrap" class="admin-lic-bulk-modal__otro-wrap" hidden>
            <label for="adminLicBulkOtro">Detalle «Otro»</label>
            <input type="text" id="adminLicBulkOtro" class="form-control admin-lic-bulk-modal__input" placeholder="des.. problema" autocomplete="off">
          </div>
        </div>
        <div class="admin-lic-bulk-modal__field admin-lic-bulk-modal__field--stack">
          <input type="text" id="adminLicBulkNote" class="form-control admin-lic-bulk-modal__input" placeholder="Notas (opcional)" autocomplete="off" aria-label="Notas (opcional)">
        </div>
        <div class="admin-lic-bulk-modal__field admin-lic-bulk-modal__field--stack admin-lic-bulk-modal__field--add-creds">
          <label for="adminLicBulkAddCreds" class="admin-lic-bulk-modal__label-plain admin-lic-bulk-modal__label-plain--stack">Agregar licencias</label>
          <textarea id="adminLicBulkAddCreds" class="form-control admin-lic-bulk-modal__input admin-lic-bulk-modal__textarea" rows="3" placeholder="Correo y contraseña, una por línea" autocomplete="off" aria-label="Agregar licencias al final del bloc"></textarea>
        </div>
      </div>
      <div class="admin-lic-bulk-modal__footer">
        <button type="button" class="btn-blue menu-btn-worksheet" id="adminLicBulkApplyBtn">Aplicar a selección</button>
      </div>
    </div>
  </div>

  <div id="adminLicWarrantyModal" class="user-lic-warranty-modal d-none" aria-hidden="true">
    <div id="adminLicWarrantyModalBackdrop" class="user-lic-warranty-modal__backdrop"></div>
    <div class="user-lic-warranty-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="adminLicWarrantyModalTitle">
      <div class="user-lic-warranty-modal__header">
        <h2 id="adminLicWarrantyModalTitle" class="user-lic-warranty-modal__title mb-0">Caídas y garantías</h2>
        <button type="button" id="adminLicWarrantyModalClose" class="user-lic-warranty-modal__close" aria-label="Cerrar">&times;</button>
      </div>
      <div id="adminLicWarrantyModalBody" class="user-lic-warranty-modal__body"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script src="{{ url_for('store_bp.static', filename='js/licencias.js') }}?v=20260519-historial-sin-contorno" defer></script>
  <script src="{{ url_for('store_bp.static', filename='js/admin_licencias_notepad.js') }}?v=13" defer></script>
{% endblock %}
